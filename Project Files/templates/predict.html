<!DOCTYPE html>
<head>
    <title>Smart Lender | Loan Prediction</title>
    <!-- Main CSS -->
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
<div class="container">
<div class="card">
    <!-- Header -->
    <div class="hero">
        <h1>🏦 Smart Lender</h1>
        <h2>AI Powered Loan Eligibility Prediction</h2>
        <p> Enter the applicant details below.</p>
    </div>
    <!-- Information Box -->
    <div class="info-box">
        <h3>
            <i class="fas fa-circle-info"></i>
            Instructions
        </h3>
        <p>
            Fill all mandatory fields correctly.
        </p>
    </div>
    <br>
    <!-- Loan Form -->
    <form action="/submit" method="POST">
    <div class="form-grid">
        <!-- Gender -->
        <div>
            <label>
                <i class="fas fa-user"></i>
                Gender
            </label>
            <select name="Gender" required>
                <option value="">Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>
        </div>
        <!-- Married -->
        <div>
            <label>
                <i class="fas fa-heart"></i>
                Married
            </label>
            <select name="Married" required>
                <option value="">Select</option>
                <option value="Yes">Yes</option>
                <option value="No">No</option>
            </select>
        </div>
        <!-- Dependents -->
        <div>
            <label>
                <i class="fas fa-users"></i>
                Dependents
            </label>
            <select name="Dependents" required>
                <option value="0">0</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3+</option>
            </select>
        </div>
        <!-- Education -->
        <div>
            <label>
                <i class="fas fa-graduation-cap"></i>
                Education
            </label>
            <select name="Education" required>
                <option value="Graduate">
                    Graduate
                </option>
                <option value="Not Graduate">
                    Not Graduate
                </option>
            </select>
        </div>
        <!-- Self Employed -->
        <div>
            <label>
                <i class="fas fa-briefcase"></i>
                Self Employed
            </label>
            <select name="Self_Employed" required>
                <option value="No">No</option>
                <option value="Yes">Yes</option>
            </select>
        </div>
        <!-- Applicant Income -->
        <div>
            <label>
                <i class="fas fa-indian-rupee-sign"></i>
                Applicant Income
            </label>
            <input
                type="number"
                name="ApplicantIncome"
                placeholder="Enter Applicant Income"
                required>
        </div>
                <!-- Coapplicant Income -->
        <div>
            <label>
                <i class="fas fa-wallet"></i>
                Coapplicant Income
            </label>
            <input
                type="number"
                name="CoapplicantIncome"
                placeholder="Enter Coapplicant Income"
                required>
        </div>
        <!-- Loan Amount -->
        <div>
            <label>
                <i class="fas fa-money-bill-wave"></i>
                Loan Amount
            </label>
            <input
                type="number"
                name="LoanAmount"
                placeholder="Enter Loan Amount"
                required>
        </div>
        <!-- Loan Amount Term -->
        <div>
            <label>
                <i class="fas fa-calendar-days"></i>
                Loan Amount Term (Months)
            </label>
            <input
                type="number"
                name="Loan_Amount_Term"
                value="24"
                placeholder="Loan Term"
                required>
        </div>
        <!-- Credit History -->
        <div>
            <label>
                <i class="fas fa-credit-card"></i>
                Credit History
            </label>
            <select name="Credit_History" required>
                <option value="1">Good (1)</option>
                <option value="0">Bad (0)</option>
            </select>
        </div>
        <!-- Property Area -->
        <div class="full-width">
            <label>
                <i class="fas fa-location-dot"></i>
                Property Area
            </label>
            <select name="Property_Area" required>
                <option value="Urban">Urban</option>
                <option value="Semiurban">Semiurban</option>
                <option value="Rural">Rural</option>
            </select>
        </div>
    </div>
    <br>
    <button
        type="submit"
        class="btn">
        <i class="fas fa-magnifying-glass-chart"></i>
        Predict Loan Approval
    </button>
    <a href="/">
        <button
            type="button"
            class="btn-secondary">
            <i class="fas fa-house"></i>
            Back to Home
        </button>
    </a>
    </form>
    <div class="footer">
        <hr>
        <p>
            <i class="fas fa-robot"></i>
            Smart Lender AI &copy; 2026
            <br>
        </p>
    </div>
</div>
</div>
</body>
</html>
