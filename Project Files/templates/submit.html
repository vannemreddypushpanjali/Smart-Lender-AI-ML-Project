<!DOCTYPE html>
<head>
    <title>Smart Lender | Result</title>
    <!-- Main CSS -->
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
<div class="container">
<div class="card">
    <!-- Header -->
    <div class="hero">
        <h1>🏦 Smart Lender</h1>
        <h2>Loan Prediction Result</h2>
    </div>
    <!-- Result Section -->
    <div class="info-box">
        <h3>
            <i class="fas fa-circle-info"></i>
            Prediction Status
        </h3>
    </div>
    <br>
    <!-- Result Card -->
    {% if "Approved" in prediction %}
    <div class="success-box">
        <h2>
            <i class="fas fa-circle-check"></i>
            Loan Approved
        </h2>
        <p>{{ message }}</p>
    </div>
    {% elif "Rejected" in prediction %}
    <div class="error-box">
        <h2>
            <i class="fas fa-circle-xmark"></i>
            Loan Rejected
        </h2>
        <p>{{ message }}</p>
    </div>
    {% else %}
    <div class="warning-box">
        <h2>
            <i class="fas fa-triangle-exclamation"></i>
            Result Uncertain
        </h2>
        <p>{{ message }}</p>
    </div>
    {% endif %}
    <br>
    <!-- Action Buttons -->
    <div style="text-align:center;">
        <a href="/predict">
            <button class="btn">
                <i class="fas fa-rotate"></i>
                Predict Another Loan
            </button>
        </a>
        <br><br>
        <a href="/">
            <button class="btn-secondary">
                <i class="fas fa-house"></i>
                Back to Home
            </button>
        </a>
    </div>
    <br>
    <!-- Footer -->
    <div class="footer">
        <hr>
        <p>
            <i class="fas fa-shield-halved"></i>
            Smart Lender AI System © 2026
            <br>
        </p>
    </div>
</div>
</div>
</body>
</html>
